name: Release

# Phase F3 — version tag push (e.g. v2.5.0) triggers:
#   1. Fast suite gate (same as CI).
#   2. ``uv build`` producing a sdist + wheel.
#   3. PyPI publish via trusted publishing (OIDC, no long-lived token).
#   4. GitHub Release with autogenerated notes.
#
# Regression suite is NOT run here — tag pushes assume the commit already
# went through the regression gate via ``regression.yml``. Keep the release
# path fast; if a tag is wrong, re-tag with the next patch version.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must exist)"
        required: true
        type: string

permissions:
  contents: write   # create GH Release
  id-token: write   # PyPI OIDC trusted publishing

jobs:
  build-and-publish:
    name: build + publish
    runs-on: ubuntu-latest
    environment: pypi   # protects the release job; configure env rules in repo settings
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Fast suite
        run: uv run pytest -q

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No password — OIDC trusted publishing (configure on PyPI side).
          # Fallback path (API token): set a PYPI_API_TOKEN secret and add
          # ``password: ${{ secrets.PYPI_API_TOKEN }}`` here; strongly prefer
          # OIDC per docs/RELEASING.md §2.
          attestations: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_REF: ${{ github.ref_name }}
        run: |
          # Never interpolate ${{ github.ref_name }} directly into a shell string;
          # it is controlled by the tag pusher. We pin to an env var above and
          # quote it here.
          gh release create "$RELEASE_REF" \
              --generate-notes \
              --title "$RELEASE_REF" \
              dist/*
